version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: taskflow_db
    environment:
      POSTGRES_USER: omkargeedh
      POSTGRES_PASSWORD:
      POSTGRES_DB: taskflow
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omkargeedh -d taskflow"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
